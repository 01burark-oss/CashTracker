name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Validate Tag And Version
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) {
            throw "Tag must start with 'v'. Example: v1.0.2"
          }

          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag version must be SemVer major.minor.patch. Found: $tag"
          }

          [xml]$projectXml = Get-Content .\CashTracker.App\CashTracker.App.csproj
          $versionNode = @($projectXml.Project.PropertyGroup | Where-Object {
            $_.PSObject.Properties.Name -contains "Version"
          })[0]
          $projectVersion = if ($null -ne $versionNode) { $versionNode.Version } else { "" }
          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw "Project version is empty in CashTracker.App.csproj"
          }

          if ($projectVersion -ne $version) {
            throw "Tag ($tag) and project version ($projectVersion) do not match."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Installer
        shell: pwsh
        run: |
          .\scripts\publish-release.ps1 `
            -Version "${{ steps.meta.outputs.version }}" `
            -Runtime "win-x64" `
            -Configuration "Release" `
            -SetupBaseName "CashTracker-Setup"

      - name: Write Update Manifest
        if: ${{ secrets.CASHTRACKER_UPDATE_SIGNING_PRIVATE_KEY_XML != '' }}
        shell: pwsh
        env:
          CASHTRACKER_UPDATE_SIGNING_PRIVATE_KEY_XML: ${{ secrets.CASHTRACKER_UPDATE_SIGNING_PRIVATE_KEY_XML }}
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $packagePath = ".\artifacts\$version\CashTracker-Setup.exe"
          $packageUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/CashTracker-Setup.exe"

          .\scripts\write-update-manifest.ps1 `
            -Version "v$version" `
            -PackageUrl $packageUrl `
            -PackagePath $packagePath `
            -OutputPath ".\artifacts\$version\update-manifest.json" `
            -MinSupportedVersion "$version"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CashTracker ${{ github.ref_name }}
          body_path: release-notes/latest.md
          overwrite_files: true
          files: |
            artifacts/${{ steps.meta.outputs.version }}/CashTracker-Setup.exe
            artifacts/${{ steps.meta.outputs.version }}/CashTracker-Setup.exe.sha256
